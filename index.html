<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion AI</title>
  <style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 2.8rem;
}

.container {
  margin-top: 30px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 25px;
  width: 400px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

canvas {
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

#label-container {
  margin-top: 15px;
  font-size: 1.4rem;
  font-weight: bold;
}

#message {
  margin-top: 15px;
  font-size: 1.1rem;
  background: rgba(255,255,255,0.12);
  padding: 15px;
  border-radius: 15px;
  line-height: 1.6;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 1rem;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff7b54, #ff3d00);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.loading {
  color: #ffd369;
  margin-top: 10px;
}
    #line1, #line2, #line3 {
  transition: all 0.3s ease;
}
</style>
</head>

<body>

<h1>Emotion AI Detector</h1>

<button onclick="window.init()">Start</button>
  <button onclick="stopAI()">Stop</button>
  

<div id="webcam-container"></div>

<div>
  <p id="line1">Emotion: -</p>
  <p id="line2">Message: -</p>
  <p id="line3">Status: -</p>
</div>

<!-- ✅ STABLE LIBRARIES (IMPORTANT FIX) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

<script>
console.log("tmImage:", typeof tmImage);

const URL = "https://teachablemachine.withgoogle.com/models/XmRqniaMs/";

let model;
let webcam;
let lastEmotion = "";
let lastSpoken = "";
let running = false;

/* ---------------- INIT ---------------- */
window.init = async function () {
  try {
    document.getElementById("line3").innerText = "Loading model...";

    if (!tmImage) throw new Error("tmImage failed to load");

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup({ facingMode: "user" });
    await webcam.play();

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    document.getElementById("line3").innerText = "Camera started";
    running = true;
    window.requestAnimationFrame(loop);

  } catch (err) {
    console.error(err);
    document.getElementById("line3").innerText = "Error: " + err.message;
  }
};

/* ---------------- LOOP ---------------- */
async function loop() {
  if (!running) return;

  if (webcam && model) {
    webcam.update();
    await predict();
  }

  window.requestAnimationFrame(loop);
}

/* ---------------- MESSAGE SYSTEM ---------------- */
function getMessage(emotion) {
  const map = {
    Sad: "Cheer up ",
    Happy: "Keep smiling ",
    Angry: "Take a deep breath ",
    Stressed: "Relax for a moment ",
    "No Human": "No face detected "
  };

  return map[emotion] || "Neutral state ";
}

/* ---------------- PREDICT ---------------- */
async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  const emotion = highest.className;

  if (emotion !== lastEmotion) {
    lastEmotion = emotion;

    const msg = getMessage(emotion);

    document.getElementById("line1").innerText = "Emotion: " + emotion;
    document.getElementById("line2").innerText = msg;
    document.getElementById("line3").innerText =
      "Confidence: " + Math.round(highest.probability * 100) + "%";

    /* SAFE VOICE (NO SPAM) */
    if (msg !== lastSpoken) {
      lastSpoken = msg;

      speechSynthesis.cancel();

      const speech = new SpeechSynthesisUtterance(msg);
      speech.rate = 1;
      speech.pitch = 1;

      speechSynthesis.speak(speech);
    }

    console.log("Emotion:", emotion);

  }
}
  function stopAI() {
  running = false;

  if (webcam) {
    webcam.stop();
  }

  speechSynthesis.cancel();

  document.getElementById("line1").innerText = "Stopped";
  document.getElementById("line2").innerText = "";
  document.getElementById("line3").innerText = "AI stopped";

  document.getElementById("webcam-container").innerHTML = "";
}
</script>

</body>
</html>
