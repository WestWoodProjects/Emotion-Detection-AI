<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion AI Detector</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 2.8rem;
}

.container {
  margin-top: 30px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 25px;
  width: 400px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

canvas {
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

#label-container {
  margin-top: 15px;
  font-size: 1.4rem;
  font-weight: bold;
}

#message {
  margin-top: 15px;
  font-size: 1.1rem;
  background: rgba(255,255,255,0.12);
  padding: 15px;
  border-radius: 15px;
  line-height: 1.6;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 1rem;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff7b54, #ff3d00);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.loading {
  color: #ffd369;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎭 Emotion Detection AI</h1>

<div class="container">
  <button onclick="init()">Start Detection</button>
  <div class="loading" id="loading"></div>

  <div id="webcam-container"></div>
  <div id="label-container"></div>
  <div id="message">
  <div id="line1">Click Start...</div>
  <div id="line2"></div>
  <div id="line3"></div>
</div>
</div>
  
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
  <script>
  console.log("tmImage:", typeof tmImage);
</script>

<script>
  let lastEmotion = "";
const URL = "https://teachablemachine.withgoogle.com/models/XmRqniaMs/";

let model, webcam;

async function init() {
  const loadingText = document.getElementById("loading");
  loadingText.innerText = "Loading model...";

  try {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup({ facingMode: "user" });
    await webcam.play();

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    setTimeout(() => {
      window.requestAnimationFrame(loop);
    }, 500);

    loadingText.innerText = "✅ Camera Started";

  } catch (error) {
    console.error(error);
    loadingText.innerText = "❌ " + error.message;
  }
}

async function loop() {
  if (!webcam || !model) return;
    webcam.update();
    await predict();
  }
  window.requestAnimationFrame(loop);
}

function getMessage(emotion) {
  const jokes = [
    "Why don’t skeletons fight? 😂",
    "Computer needed a break 😭",
    "Math book: too many problems 🤣"
  ];

  const stressTips = [
    "Take a deep breath 😌",
    "Stretch 🧘",
    "Reset your mind 🔄"
  ];

  const angerTips = [
    "Punch pillow 😤",
    "Walk 🚶",
    "Count slowly 😶"
  ];

  if (emotion === "Sad") return "😂 " + jokes[Math.floor(Math.random()*jokes.length)];
  if (emotion === "Stressed") return "🧠 " + stressTips[Math.floor(Math.random()*stressTips.length)];
  if (emotion === "Angry") return "💥 " + angerTips[Math.floor(Math.random()*angerTips.length)];
  if (emotion === "Happy") return "😎 You're glowing!";
  if (emotion === "No Human") return "👀 Come back human!";

  return "🙂";
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  const emotion = highest.className;

  if (emotion !== lastEmotion) {
    lastEmotion = emotion;

    const msg = getMessage(emotion);
    const box = document.getElementById("message");

    // UI animation
    box.style.transform = "scale(1.05)";
    setTimeout(() => box.style.transform = "scale(1)", 200);

    document.getElementById("line1").innerText = "Emotion: " + emotion;
    document.getElementById("line2").innerText = msg;
    document.getElementById("line3").innerText = "AI is analyzing...";

    // Voice (SAFE version)
    if (msg !== lastSpoken) {
      lastSpoken = msg;
      speechSynthesis.cancel();

      let speech = new SpeechSynthesisUtterance(msg);
      speech.rate = 1;
      speech.pitch = 1;

      speechSynthesis.speak(speech);
    }

    console.log("Detected emotion:", emotion);
  }
}
</script>

</body>
</html>
