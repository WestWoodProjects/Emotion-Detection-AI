<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion AI Detector</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 2.8rem;
}

.container {
  margin-top: 30px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 25px;
  width: 400px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

canvas {
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

#label-container {
  margin-top: 15px;
  font-size: 1.4rem;
  font-weight: bold;
}

#message {
  margin-top: 15px;
  font-size: 1.2rem;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 1rem;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff7b54, #ff3d00);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.loading {
  color: #ffd369;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎭 Emotion Detection AI</h1>

<div class="container">
  <button onclick="init()">Start Detection</button>
  <div class="loading" id="loading"></div>

  <div id="webcam-container"></div>
  <div id="label-container"></div>
  <div id="message">Click Start to begin...</div>
</div>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  <script>
  console.log("tmImage:", typeof tmImage);
</script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/XmRqniaMs/";

let model, webcam, labelContainer;

async function init() {
  const loadingText = document.getElementById("loading");
  loadingText.innerText = "Loading model...";

  try {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    webcam = new tmImage.Webcam(300, 300, true);

    await webcam.setup({ facingMode: "user" }); // ✅ FIXED
    await webcam.play();

    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");

    loadingText.innerText = "✅ Camera Started";

  } catch (error) {
    console.error("REAL ERROR:", error);

    // Show actual error instead of generic one
    loadingText.innerText = "❌ Error: " + error.message;
    alert("Error: " + error.message);
  }
}

async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

function getMessage(emotion) {
  const jokes = [
    "Why don’t skeletons fight each other? They don’t have the guts 😂",
    "I told my computer I needed a break… it froze 😭",
    "Math book sad? Too many problems 🤣"
  ];

  const stressTips = [
    "Take a deep breath 😌",
    "Stretch for 2 minutes 🧘",
    "Close eyes. Reset 🔄"
  ];

  const angerTips = [
    "Punch pillow, not people 😤",
    "Walk fast 🚶",
    "Count slowly 😶"
  ];

  if (emotion === "Sad") return "😂 " + jokes[Math.floor(Math.random()*jokes.length)];
  if (emotion === "Stressed") return "🧠 " + stressTips[Math.floor(Math.random()*stressTips.length)];
  if (emotion === "Angry") return "💥 " + angerTips[Math.floor(Math.random()*angerTips.length)];
  if (emotion === "Happy") return "😎 You're glowing!";
  if (emotion === "No Human") return "👀 Come back human!";

  return "";
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let highest = prediction.reduce((a, b) => 
    a.probability > b.probability ? a : b
  );

  labelContainer.innerHTML = "Detected: " + highest.className;

  document.getElementById("message").innerText =
    getMessage(highest.className);
}
</script>

</body>
</html>
