<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vibe Check AI</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;500;600&display=swap');

:root{
    --primary: #00eaff;
    --bg: #020617;
}

/* BODY */
body{
    margin:0;
    min-height:100vh;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top, #111827, #020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.main-box{
    width:420px;
    padding:30px;
    border-radius:25px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(0,234,255,0.2);
    text-align:center;
}

/* TITLE */
h1{
    font-family:'Orbitron', sans-serif;
    color:var(--primary);
    text-shadow:0 0 15px var(--primary);
}

/* BUTTONS */
.button-group{
    display:flex;
    gap:10px;
    justify-content:center;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
}

.start-btn{background:#00eaff;color:black;}
.stop-btn{background:#ff4d4d;color:white;}
.capture-btn{background:#8a2be2;color:white;}

/* CAMERA */
#webcam-container{
    margin:20px auto;
    width:300px;
    height:300px;
    border-radius:20px;
    overflow:hidden;
    border:2px solid var(--primary);
}

/* TEXT */
.status-box{
    margin-top:20px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:15px;
}

#line1{color:#00eaff;font-weight:600;}
#line3{opacity:0.7;font-size:14px;}
</style>
</head>

<body>

<div class="main-box">
    <h1>Vibe Check AI</h1>

    <div class="button-group">
        <button class="start-btn" onclick="init()">Start</button>
        <button class="stop-btn" onclick="stopAI()">Stop</button>
        <button class="capture-btn" onclick="capture()">Capture</button>
    </div>

    <div id="webcam-container"></div>

    <div class="status-box">
        <p id="line1">Emotion: -</p>
        <p id="line2">Message: -</p>
        <p id="line3">Status: Waiting</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/jH8BkVVNO/";

let model, webcam;
let running = false;
let frozen = false;
let lastSpoken = "";

/* MESSAGES */
const captions = {
  Happy: "You're glowing today ✨",
  Sad: "Take it easy 💙",
  Angry: "Pause. Breathe.",
  Stressed: "Slow down 🧘",
  Neutral: "Calm and steady.",
  Unknown: "..."
};

/* INIT */
async function init() {
  try {
    document.getElementById("line3").innerText = "Starting camera...";

    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    webcam = new tmImage.Webcam(300,300,true);
    await webcam.setup();
    await webcam.play();

    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    container.appendChild(webcam.canvas);

    running = true;
    requestAnimationFrame(loop);

  } catch (e) {
    console.error(e);
    document.getElementById("line3").innerText = "Camera error";
  }
}

/* LOOP */
async function loop() {
  if (!running) return;

  if (!frozen) webcam.update();

  await predict();

  requestAnimationFrame(loop);
}

/* PREDICT */
async function predict() {
  if (!model || !webcam) return;

  const prediction = await model.predict(webcam.canvas);

  let best = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  let emotion = best.className.toLowerCase().trim();

  if (emotion.includes("happy")) emotion = "Happy";
  else if (emotion.includes("sad")) emotion = "Sad";
  else if (emotion.includes("angry")) emotion = "Angry";
  else if (emotion.includes("stress")) emotion = "Stressed";
  else if (emotion.includes("neutral")) emotion = "Neutral";
  else emotion = "Unknown";

  const msg = captions[emotion];

  document.getElementById("line1").innerText = "Emotion: " + emotion;
  document.getElementById("line2").innerText = msg;
  document.getElementById("line3").innerText =
    "Confidence: " + Math.round(best.probability * 100) + "%";

  speak(msg);
}

/* VOICE */
function speak(msg) {
  if (msg === lastSpoken) return;
  lastSpoken = msg;

  speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(msg);
  speech.rate = 0.9;
  speech.pitch = 1.1;

  speechSynthesis.speak(speech);
}

/* CAPTURE */
function capture() {
  if (!webcam) return;

  frozen = !frozen;

  document.getElementById("line3").innerText =
    frozen ? "📸 Captured" : "▶ Live";
}

/* STOP */
function stopAI() {
  running = false;
  frozen = false;

  if (webcam) webcam.stop();

  speechSynthesis.cancel();

  document.getElementById("webcam-container").innerHTML = "";
  document.getElementById("line1").innerText = "Stopped";
  document.getElementById("line2").innerText = "";
  document.getElementById("line3").innerText = "AI stopped";
}
</script>

</body>
</html>
